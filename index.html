<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Toolkit - Date Calculator</title>
<style>
body{font-family:Arial,sans-serif;max-width:700px;margin:auto;padding:20px;background:#f4f6f8}
.tabs{display:flex;gap:8px;margin-bottom:15px}
.tabbtn{padding:10px 14px;border:none;background:#ddd;border-radius:6px;cursor:pointer}
.tabbtn.active{background:#2563eb;color:white}
.tab{display:none;background:white;padding:18px;border-radius:8px}
.tab.active{display:block}
label{display:block;margin-top:10px;font-weight:bold}
input{width:100%;padding:10px;margin-top:4px}
button.calc{margin-top:15px;padding:10px;width:100%;background:#2563eb;color:white;border:none;border-radius:6px}
.result{white-space:pre-line;background:#eef3ff;padding:12px;margin-top:15px;border-radius:6px}
</style>
</head>
<body>
<h1>PM Toolkit - Date Calculator</h1>

<div class="tabs">
<button class="tabbtn active" onclick="showTab('days',this)">Days Between</button>
<button class="tabbtn" onclick="showTab('add',this)">Add/Subtract</button>
<button class="tabbtn" onclick="showTab('age',this)">Age</button>
</div>

<div id="days" class="tab active">
<label>Start Date</label><input type="date" id="s">
<label>End Date</label><input type="date" id="e">
<button class="calc" onclick="calcDays()">Calculate</button>
<div id="r1" class="result"></div>
</div>

<div id="add" class="tab">
<label>Start Date</label><input type="date" id="d">
<label>Number of Days</label><input type="number" id="n" value="30">
<button class="calc" onclick="addDays()">Add Days</button>
<div id="r2" class="result"></div>
</div>

<div id="age" class="tab">
<label>Birthday</label><input type="date" id="b">
<label>As Of Date</label><input type="date" id="a">
<button class="calc" onclick="calcAge()">Calculate Age</button>
<div id="r3" class="result"></div>
</div>

<script>
function showTab(id,btn){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tabbtn').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
btn.classList.add('active');
}
function fmt(d){return d.toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
function p(v){let x=v.split('-').map(Number);return new Date(x[0],x[1]-1,x[2]);}
const today=new Date();
document.getElementById('a').value=today.toISOString().slice(0,10);

function calcDays(){
let s=p(document.getElementById('s').value);
let e=p(document.getElementById('e').value);
let diff=Math.round((e-s)/86400000);
document.getElementById('r1').textContent=`${diff} calendar days`;
}
function addDays(){
let d=p(document.getElementById('d').value);
let n=parseInt(document.getElementById('n').value);
d.setDate(d.getDate()+n);
document.getElementById('r2').textContent=fmt(d);
}
function calcAge(){
let b=p(document.getElementById('b').value);
let a=p(document.getElementById('a').value);
let y=a.getFullYear()-b.getFullYear();
let m=a.getMonth()-b.getMonth();
let day=a.getDate()-b.getDate();
if(day<0){m--;let last=new Date(a.getFullYear(),a.getMonth(),0).getDate();day+=last;}
if(m<0){y--;m+=12;}
let total=Math.round((a-b)/86400000);
document.getElementById('r3').textContent=
`Age: ${y} years, ${m} months, ${day} days

Total days old: ${total.toLocaleString()}`;
}
</script>
</body>
</html>
